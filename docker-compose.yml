version: '3.8'

# ===========================================
# Servicios
# ===========================================
services:
  # -------------------------------------------
  # Servidor MCP (Tu aplicación Go)
  # -------------------------------------------
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-bike-finder
    restart: unless-stopped
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
    networks:
      - bike-network
    depends_on:
      postgres:
        condition: service_healthy
    # Para desarrollo local con Stdio, comentamos ports
    # Para producción con SSE/HTTP, descomentar:
    # ports:
    #   - "8080:8080"

  # -------------------------------------------
  # PostgreSQL (Ya existente, pero incluido para referencia)
  # -------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: bike-finder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - bike-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------
  # MCP Inspector (Solo para desarrollo)
  # -------------------------------------------
  mcp-inspector:
    image: node:22-alpine
    container_name: mcp-inspector
    working_dir: /app
    command: npx @modelcontextprotocol/inspector
    ports:
      - "5173:5173"
      - "6277:6277"
    networks:
      - bike-network
    profiles:
      - dev

# ===========================================
# Volúmenes
# ===========================================
volumes:
  postgres-data:
    driver: local

# ===========================================
# Redes
# ===========================================
networks:
  bike-network:
    driver: bridge

    